---
- name: Install required packages
  ansible.builtin.apt:
    name:
      - unzip
    state: present
- name: Create rustfs user
  ansible.builtin.user:
    name: rustfs
    system: true
    shell: /bin/false
    home: /opt/rustfs
    create_home: true
- name: Create data directory
  ansible.builtin.file:
    path: "{{ rustfs_data_dir }}"
    state: directory
    owner: rustfs
    group: rustfs
    mode: '0755'
- name: Create rustfs log directory
  ansible.builtin.file:
    path: /var/log/rustfs
    state: directory
    owner: rustfs
    group: rustfs
    mode: '0755'
- name: Create rustfs configuration directory
  ansible.builtin.file:
    path: /etc/rustfs
    state: directory
    owner: rustfs
    group: rustfs
    mode: '0755'
- name: Create rustfs binary directory
  ansible.builtin.file:
    path: /opt/rustfs/bin
    state: directory
    owner: rustfs
    group: rustfs
    mode: '0755'
- name: Download RustFS server archive
  ansible.builtin.get_url:
    url: "{{ rustfs_server_url }}"
    dest: /tmp/rustfs-server.zip
    mode: '0644'
  notify: Restart rustfs
- name: Extract RustFS server binary
  ansible.builtin.unarchive:
    src: /tmp/rustfs-server.zip
    dest: /opt/rustfs/bin/
    remote_src: true
    owner: rustfs
    group: rustfs
    mode: '0755'
- name: Ensure rustfs binary is executable
  ansible.builtin.file:
    path: /opt/rustfs/bin/rustfs
    owner: rustfs
    group: rustfs
    mode: '0755'
- name: Download RustFS client archive
  ansible.builtin.get_url:
    url: "{{ rustfs_client_url }}"
    dest: /tmp/rustfs-cli.tar.gz
    mode: '0644'
- name: Extract RustFS client binary
  ansible.builtin.unarchive:
    src: /tmp/rustfs-cli.tar.gz
    dest: /opt/rustfs/bin/
    remote_src: true
    owner: rustfs
    group: rustfs
    mode: '0755'
- name: Create symlinks for rustfs binaries
  ansible.builtin.file:
    src: "/opt/rustfs/bin/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    state: link
  loop:
    - rustfs
    - rc
- name: Generate RustFS configuration
  ansible.builtin.template:
    src: rustfs.j2
    dest: /etc/rustfs/rustfs
    owner: rustfs
    group: rustfs
    mode: '0640'
  notify: Restart rustfs
- name: Create systemd service file
  ansible.builtin.template:
    src: rustfs.service.j2
    dest: /etc/systemd/system/rustfs.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd
    - Restart rustfs
- name: Enable and start RustFS service
  ansible.builtin.systemd:
    name: rustfs
    enabled: true
    state: started
    daemon_reload: true
- name: Wait for RustFS API to be ready
  ansible.builtin.wait_for:
    port: "{{ rustfs_port }}"
    host: "{{ ansible_facts['default_ipv4']['address'] }}"
    delay: 10
    timeout: 60
- name: Wait for RustFS Console to be ready
  ansible.builtin.wait_for:
    port: "{{ rustfs_console_port }}"
    host: "{{ ansible_facts['default_ipv4']['address'] }}"
    delay: 5
    timeout: 60
