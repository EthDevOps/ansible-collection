---
# RustFS version and download URLs
rustfs_version: "1.0.0-alpha.89"
rustfs_server_url: "https://github.com/rustfs/rustfs/releases/download/{{ rustfs_version }}/rustfs-linux-x86_64-musl-v{{ rustfs_version }}.zip"
rustfs_client_url: "https://github.com/rustfs/cli/releases/download/v0.1.3/rustfs-cli-linux-amd64-v0.1.3.tar.gz"
# RustFS configuration
rustfs_port: 9000
rustfs_console_port: 9001
rustfs_data_dir: "/data"
rustfs_domain: ""
# RustFS credentials (should be overridden with secrets)
rustfs_access_key: "rustfsadmin"
rustfs_secret_key: "rustfsadmin"
# Additional RustFS environment variables
rustfs_extra_env_vars: {}
