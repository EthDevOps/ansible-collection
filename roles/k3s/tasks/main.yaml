---
- name: Setup k3s
  when: not k3s_cleanup
  block:
    - name: Check for prerequirements
      ansible.builtin.import_tasks: prereq.yaml
    - name: Download k3s
      ansible.builtin.import_tasks: download.yaml
    - name: Setup Docker Cache
      ansible.builtin.import_tasks: cache.yaml
      when: k3s_docker_cache != ""
    # The join token used to live in Environment="K3S_TOKEN=..." on a 0644
    # systemd unit, which leaked the secret to every local user. Render it
    # to a 0600 file and let k3s read it via --token-file instead.
    - name: Ensure /etc/rancher/k3s exists
      ansible.builtin.file:
        path: /etc/rancher/k3s
        state: directory
        owner: root
        group: root
        mode: '0700'
    - name: Deploy k3s join token
      ansible.builtin.copy:
        content: "{{ k3s_token }}"
        dest: /etc/rancher/k3s/token
        owner: root
        group: root
        mode: '0600'
      no_log: true
    - name: Setup server node
      ansible.builtin.import_tasks: server.yaml
      when: k3s_role == "server"
    - name: Setup agent node
      ansible.builtin.import_tasks: agent.yaml
      when: k3s_role == "agent"
- name: Cleanup k3s
  ansible.builtin.import_tasks: cleanup.yaml
  when: k3s_cleanup
