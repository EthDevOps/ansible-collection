---
- name: Find host with k3s_bootstrap defined
  ansible.builtin.set_fact:
    k3s_bootstrap_host: "{{ item }}"
  loop: "{{ groups['device_roles_k3s-server'] | map('extract', hostvars) | selectattr('k3s_bootstrap', 'defined') | list }}"
  when: k3s_bootstrap_host is not defined
  loop_control:
    label: "{{ item.inventory_hostname }}"
- name: Set bootstrap
  when: k3s_bootstrap is not defined
  ansible.builtin.set_fact:
    k3s_server_join: "--server=https://{{ k3s_server_lb_ip }}:6443"
- name: Copy vector audit scraper
  ansible.builtin.copy:
    src: vector-audit.yaml
    dest: /etc/vector/k3s.yaml
  notify: Reload vector
- name: Copy K3s service file
  register: k3s_service
  ansible.builtin.template:
    src: "k3s-server.service.j2"
    dest: "{{ k3s_systemd_dir }}/k3s-server.service"
    owner: root
    group: root
    mode: "0644"
- name: Create directory .kube
  ansible.builtin.file:
    path: ~/{{ ansible_user }}/.kube
    state: directory
    owner: "{{ ansible_user }}"
    mode: "u=rwx,g=rx,o="
- name: Create dir for /etc/rancher/k3s/config.yaml.d
  ansible.builtin.file:
    path: /etc/rancher/k3s/config.yaml.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  when: (k3s_etcd_enabled and k3s_etcd_snapshot_enabled) or k3s_hardening_enabled
- name: Create backup file for etcd
  ansible.builtin.template:
    src: "k3s-etcd-backup.yaml.j2"
    dest: "/etc/rancher/k3s/config.yaml.d/etcd-backup.yaml"
    owner: root
    group: root
    mode: "0644"
  when: k3s_etcd_enabled and k3s_etcd_snapshot_enabled
- name: Deploy CIS hardening config
  ansible.builtin.template:
    src: "k3s-hardening.yaml.j2"
    dest: "/etc/rancher/k3s/config.yaml.d/hardening.yaml"
    owner: root
    group: root
    mode: "0600"
  when: k3s_hardening_enabled
- name: Create Server Audit directory
  ansible.builtin.file:
    path: "{{ k3s_server_location }}/server"
    state: directory
  when: k3s_hardening_enabled
- name: Deploy audit policy file
  ansible.builtin.copy:
    src: "audit-policy.yaml"
    dest: "{{ k3s_server_location }}/server/audit.yaml"
    owner: root
    group: root
    mode: "0600"
  when: k3s_hardening_enabled
- name: Deploy Pod Security Admission config
  ansible.builtin.copy:
    src: "psa.yaml"
    dest: "{{ k3s_server_location }}/server/psa.yaml"
    owner: root
    group: root
    mode: "0600"
  when: k3s_hardening_enabled
- name: Create audit log directory
  ansible.builtin.file:
    path: "{{ k3s_server_location }}/server/logs"
    state: directory
    owner: root
    group: root
    mode: '0700'
  when: k3s_hardening_enabled
# k3s keeps the audit log under /var/lib/rancher/k3s/server/logs/ at 0700
# root:root. Vector's file source needs read+traverse to ingest it; the
# CAP_DAC_READ_SEARCH ambient cap can grant this in principle but was
# observed to leave vector's source in a silent wedge. POSIX ACLs scope a
# stable read grant to the shipper user without relaxing the dir mode.
- name: Check whether the configured audit log reader user exists
  ansible.builtin.getent:
    database: passwd
    key: "{{ k3s_audit_log_reader_user }}"
    fail_key: false
  register: k3s_audit_reader
  when: k3s_hardening_enabled and k3s_audit_log_reader_user | length > 0
- name: Set fact for audit log ACL enablement
  ansible.builtin.set_fact:
    k3s_audit_acl_enabled: >-
      {{ k3s_hardening_enabled
         and (k3s_audit_log_reader_user | length > 0)
         and (k3s_audit_reader.ansible_facts.getent_passwd[k3s_audit_log_reader_user] | default(false)) is truthy }}
- name: Ensure acl package is installed for audit log shipper
  ansible.builtin.package:
    name: acl
    state: present
  when: k3s_audit_acl_enabled | bool
- name: Grant audit log reader traverse on k3s server dir
  ansible.posix.acl:
    path: "{{ k3s_server_location }}/server"
    entity: "{{ k3s_audit_log_reader_user }}"
    etype: user
    permissions: x
    state: present
  when: k3s_audit_acl_enabled | bool
- name: Grant audit log reader read+traverse on audit log directory
  ansible.posix.acl:
    path: "{{ k3s_server_location }}/server/logs"
    entity: "{{ k3s_audit_log_reader_user }}"
    etype: user
    permissions: rx
    state: present
  when: k3s_audit_acl_enabled | bool
  notify: Restart audit log shipper
- name: Default ACL so rotated audit log files inherit reader access
  ansible.posix.acl:
    path: "{{ k3s_server_location }}/server/logs"
    entity: "{{ k3s_audit_log_reader_user }}"
    etype: user
    permissions: r
    default: true
    state: present
  when: k3s_audit_acl_enabled | bool
  notify: Restart audit log shipper
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
- name: Get k3s-server service state
  ansible.builtin.systemd:
    name: k3s-server
  register: k3s_server_state
- name: Enable and check K3s server # noqa: no-handler
  ansible.builtin.systemd:
    name: k3s-server
    state: restarted
    enabled: true
  throttle: 1
  when: k3s_service.changed or k3s_server_state.status.ActiveState != 'active'
- name: Wait for k3s server to be ready after restart # noqa: no-handler
  ansible.builtin.command: k3s kubectl get nodes
  register: k3s_ready
  until: k3s_ready.rc == 0
  retries: 30
  delay: 10
  changed_when: false
  throttle: 1
  when: k3s_service.changed or k3s_server_state.status.ActiveState != 'active'
# The default ACL handles future rotations, but k3s already created the
# live audit.log before this role applied ACLs to its parent directory —
# explicitly grant the reader access on the current file so the shipper
# doesn't have to wait for a rollover. Notifies the shipper restart so a
# wedged vector source picks up the new file immediately.
- name: Stat current audit.log
  ansible.builtin.stat:
    path: "{{ k3s_server_location }}/server/logs/audit.log"
  register: k3s_audit_log_file
  when: k3s_audit_acl_enabled | bool
- name: Grant audit log reader read on current audit.log
  ansible.posix.acl:
    path: "{{ k3s_server_location }}/server/logs/audit.log"
    entity: "{{ k3s_audit_log_reader_user }}"
    etype: user
    permissions: r
    state: present
  when:
    - k3s_audit_acl_enabled | bool
    - k3s_audit_log_file.stat.exists | default(false)
  notify: Restart audit log shipper
- name: Copy config file to user home directory
  ansible.builtin.copy:
    src: /etc/rancher/k3s/k3s.yaml
    dest: ~/{{ ansible_user }}/.kube/config
    remote_src: true
    owner: "{{ ansible_user }}"
    mode: "u=rw,g=,o="
# - name: Replace https://localhost:6443 by https://master-ip:6443
#   ansible.builtin.command: >-
#     k3s kubectl config set-cluster default
#     --server=https://{{ k3s_server_lb_ip }}:6443
#     --kubeconfig ~/{{ ansible_user }}/.kube/config
#   changed_when: true
- name: Create kubectl symlink
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/kubectl
    state: link
- name: Create crictl symlink
  ansible.builtin.file:
    src: /usr/local/bin/k3s
    dest: /usr/local/bin/crictl
    state: link
