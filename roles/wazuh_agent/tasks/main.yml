---
- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - gnupg
      - apt-transport-https
    state: present
    update_cache: true
- name: Download Wazuh GPG key
  ansible.builtin.get_url:
    url: https://packages.wazuh.com/key/GPG-KEY-WAZUH
    dest: /tmp/wazuh-gpg-key
    mode: '0644'
- name: Import Wazuh GPG key into keyring
  ansible.builtin.command:
    cmd: >
      gpg --no-default-keyring
      --keyring gnupg-ring:/usr/share/keyrings/wazuh.gpg
      --import /tmp/wazuh-gpg-key
    creates: /usr/share/keyrings/wazuh.gpg
- name: Set permissions on Wazuh keyring
  ansible.builtin.file:
    path: /usr/share/keyrings/wazuh.gpg
    mode: '0644'
- name: Clean up downloaded GPG key
  ansible.builtin.file:
    path: /tmp/wazuh-gpg-key
    state: absent
- name: Add Wazuh apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/wazuh.gpg] https://packages.wazuh.com/4.x/apt/ stable main"
    filename: wazuh
    state: present
- name: Install Wazuh agent
  ansible.builtin.apt:
    name: "wazuh-agent={{ wazuh_agent_version }}"
    state: present
    update_cache: true
  environment:
    WAZUH_MANAGER: "{{ wazuh_agent_manager_host }}"
  notify: Restart wazuh-agent
- name: Configure Wazuh manager address
  ansible.builtin.lineinfile:
    path: /var/ossec/etc/ossec.conf
    regexp: '(\s*)<address>[^<]*</address>'
    line: '\1<address>{{ wazuh_agent_manager_host }}</address>'
    backrefs: true
  notify: Restart wazuh-agent
- name: Write enrollment password
  ansible.builtin.copy:
    content: "{{ wazuh_agent_registration_password }}"
    dest: /var/ossec/etc/authd.pass
    owner: root
    group: wazuh
    mode: '0640'
  when: wazuh_agent_registration_password | length > 0
  notify: Restart wazuh-agent
- name: Enable and start Wazuh agent
  ansible.builtin.systemd:
    name: wazuh-agent
    enabled: true
    state: started
    daemon_reload: true
