---
- name: Setup basics
  ansible.builtin.import_tasks: basics.yaml
- name: Apply kernel hardening sysctls
  ansible.builtin.import_tasks: kernel_hardening.yaml
  when: ansible_facts["virtualization_type"] != "lxc"
- name: Disable automatic updates
  ansible.builtin.import_tasks: disable_auto_updates.yaml
  when: ansible_facts["distribution"] == "Ubuntu"
- name: Setup User
  ansible.builtin.import_tasks: user.yaml
- name: Setup SSHd
  ansible.builtin.import_tasks: ssh.yaml
- name: Disable IPv6 privacy extensions
  ansible.builtin.import_tasks: disable_ipv6_privacy.yaml
- name: Setup storage optimization
  ansible.builtin.import_tasks: storage_optimization.yaml
  when: bootstrap_storage_optimized is defined and bootstrap_storage_optimized | bool
