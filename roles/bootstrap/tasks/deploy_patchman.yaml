---
- name: Make sure keyring dir exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
- name: Remove old openbytes repo configuration
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/repo_openbytes_ie_patchman_debian.list
    state: absent
- name: Remove obsolete openbytes apt key
  ansible.builtin.file:
    path: /etc/apt/keyrings/openbytes.gpg
    state: absent
# trusted=yes without signed-by: the upstream openbytes signing key has
# invalid binding signatures that trixie's sqv verifier rejects, producing
# noisy warnings on every apt update. trusted=yes already short-circuits
# verification, so dropping signed-by stops apt from attempting it at all.
- name: Add openbytes repo
  ansible.builtin.apt_repository:
    repo: "deb [trusted=yes] https://repo.openbytes.ie/patchman/debian {{ ansible_distribution_release }} main"
  notify:
    - Update apt cache
- name: Install PatchMan client
  ansible.builtin.apt:
    name: patchman-client
- name: Create patchman client config
  ansible.builtin.template:
    src: patchman.conf.j2
    dest: /etc/patchman/patchman-client.conf
- name: Add patchman as a cronjob
  ansible.builtin.cron:
    name: "hourly run of patchman"
    user: "root"
    minute: "0"
    hour: "1"
    job: "/usr/sbin/patchman-client"
- name: Initial run of patchman-client
  ansible.builtin.command:
    cmd: /usr/sbin/patchman-client
