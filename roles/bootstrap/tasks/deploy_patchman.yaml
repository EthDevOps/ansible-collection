---
- name: Make sure keyring dir exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
- name: Make sure GunPG is installed
  ansible.builtin.apt:
    name: gnupg2
- name: Remove old openbytes repo configuration
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/repo_openbytes_ie_patchman_debian.list
    - /etc/apt/sources.list.d/repo_openbytes_ie_patchman_ubuntu.list
# Ubuntu and Debian trixie+ require openbytes-1.gpg; the original openbytes.gpg
# has malformed binding signatures that trixie's sqv verifier rejects and does
# not contain the key used to sign the Ubuntu repo (551582C0FCAAD24A).
# force: true ensures hosts re-fetch the key after a distro upgrade.
- name: Get openbytes apt key
  ansible.builtin.get_url:
    url: "{{ 'https://repo.openbytes.ie/openbytes-1.gpg' if (ansible_facts['distribution'] == 'Ubuntu' or ansible_facts['distribution_release'] in ['trixie', 'forky']) else 'https://repo.openbytes.ie/openbytes.gpg' }}"
    dest: /etc/apt/keyrings/openbytes.gpg
    force: true
  notify:
    - Update apt cache
- name: Add openbytes repo
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/openbytes.gpg] https://repo.openbytes.ie/patchman/{{ ansible_facts['distribution'] | lower }} {{ ansible_facts['distribution_release'] }} main"
    filename: patchman
  notify:
    - Update apt cache
- name: Install PatchMan client
  ansible.builtin.apt:
    name: patchman-client
- name: Create patchman client config
  ansible.builtin.template:
    src: patchman.conf.j2
    dest: /etc/patchman/patchman-client.conf
- name: Add patchman as a cronjob
  ansible.builtin.cron:
    name: "hourly run of patchman"
    user: "root"
    minute: "0"
    hour: "1"
    job: "/usr/sbin/patchman-client"
- name: Initial run of patchman-client
  ansible.builtin.command:
    cmd: /usr/sbin/patchman-client
