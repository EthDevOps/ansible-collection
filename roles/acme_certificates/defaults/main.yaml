---
acme_certificates_server: acme.ethquokkaops.io
acme_certificates_cert_email: devops+acme@ethereum.org
# Certificate profile: "default" (90-day) or "shortlived" (6-day)
acme_certificates_profile: default
acme_certificates_cert_domains:
  - domain: keil-connect.com
    username: example
    password: example
    subdomain: example
# Cert inventory integration. When acme_certificates_inventory_url is set,
# a certbot --deploy-hook will POST metadata about each newly issued or
# renewed cert to this endpoint. Failures are logged but do not block renewal.
acme_certificates_inventory_url: ""
acme_certificates_inventory_token: ""
acme_certificates_inventory_source: letsencrypt
# Optional. When defined, deploys a shared Let's Encrypt account onto the host
# so multiple hosts can issue certs from the same ACME account (required for
# CAA accounturi= pinning across HA pairs). Reconciles existing renewal configs
# to the canonical account_hash and force-renews any certs that were issued
# under a different account.
#
# acme_certificates_account:
#   account_hash: "<sha256 hex of the account JWK, i.e. the directory name under
#                  /etc/letsencrypt/accounts/acme-v02.api.letsencrypt.org/directory/>"
#   regr_json: "<full contents of regr.json>"
#   private_key_json: "<full contents of private_key.json>"
#   meta_json: "<full contents of meta.json>"
