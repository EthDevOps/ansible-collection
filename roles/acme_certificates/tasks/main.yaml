---
- name: Update apt cache (tolerate broken third-party repos)
  ansible.builtin.apt:
    update_cache: true
  register: acme_certificates_apt_update
  failed_when: false
- name: Warn if apt cache update did not fully succeed
  when: acme_certificates_apt_update.failed | default(false) or 'Failed to fetch' in (acme_certificates_apt_update.stderr | default(''))
  ansible.builtin.debug:
    msg: >-
      apt-get update reported errors; continuing with the existing cache.
      Details: {{ acme_certificates_apt_update.msg | default(acme_certificates_apt_update.stderr | default('unknown')) }}
- name: Remove OD certbot
  ansible.builtin.apt:
    state: absent
    pkg:
      - certbot
      - python3-certbot-dns-cloudflare
- name: Install snapd
  ansible.builtin.apt:
    pkg:
      - snapd
- name: Install jq for cert inventory deploy hook
  when: acme_certificates_inventory_url | length > 0
  ansible.builtin.apt:
    pkg:
      - jq
- name: Enable and start snapd socket
  ansible.builtin.systemd:
    name: snapd.socket
    enabled: true
    state: started
- name: Install snap core
  community.general.snap:
    name: core
    state: present
- name: Install certbot via snap
  community.general.snap:
    name: certbot
    classic: true
    state: present
- name: Create certbot symlink
  ansible.builtin.file:
    src: /snap/bin/certbot
    dest: /usr/bin/certbot
    state: link
- name: Stop and disable the certbot-snap auto-renewal timer
  # The root crontab renews certs in choreography with the peer LB (6h apart);
  # the snap timer fires at 01:37 / 21:43 on every host and breaks that choreography,
  # causing concurrent ACME orders against the shared LE account.
  ansible.builtin.systemd:
    name: snap.certbot.renew.timer
    state: stopped
    enabled: false
  failed_when: false
- name: Remove snap-installed certbot renew timer unit so it can be masked
  ansible.builtin.file:
    path: /etc/systemd/system/snap.certbot.renew.timer
    state: absent
- name: Mask the certbot-snap auto-renewal timer
  ansible.builtin.systemd:
    name: snap.certbot.renew.timer
    masked: true
    daemon_reload: true
- name: Download acme-dns-hook
  ansible.builtin.get_url:
    url: >-
      https://github.com/koesie10/acme-dns-certbot-hook/releases/download/v0.1.1/acme-dns-certbot-hook_0.1.1_linux_amd64.tar.gz
    dest: /tmp/acme-dns-certbot-hook.tar.gz
    mode: '0644'
- name: Extract acme-dns-certbot-hook tarball
  ansible.builtin.unarchive:
    src: /tmp/acme-dns-certbot-hook.tar.gz
    dest: /usr/local/bin
    remote_src: true
- name: Generate acme-dns config
  ansible.builtin.template:
    src: acme-dns.cfg.j2
    dest: /etc/acme-dns.cfg
- name: Generate cert prepare script
  ansible.builtin.template:
    src: prepare-certs.sh.j2
    dest: /usr/local/bin/prepare-certs.sh
    mode: '0755'
- name: Generate cert inventory deploy hook
  when: acme_certificates_inventory_url | length > 0
  ansible.builtin.template:
    src: inventory-cert.sh.j2
    dest: /usr/local/bin/inventory-cert.sh
    owner: root
    group: root
    mode: '0700'
  no_log: true
- name: Deploy unified Let's Encrypt account
  when:
    - acme_certificates_account is defined
    - acme_certificates_account.account_hash | default('') | length > 0
  vars:
    _acme_account_dir: "/etc/letsencrypt/accounts/acme-v02.api.letsencrypt.org/directory/{{ acme_certificates_account.account_hash }}"
  block:
    - name: Ensure LE account directory tree exists
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: root
        mode: '0700'
      loop:
        - /etc/letsencrypt/accounts
        - /etc/letsencrypt/accounts/acme-v02.api.letsencrypt.org
        - /etc/letsencrypt/accounts/acme-v02.api.letsencrypt.org/directory
        - "{{ _acme_account_dir }}"
    - name: Deploy LE account regr.json
      ansible.builtin.copy:
        dest: "{{ _acme_account_dir }}/regr.json"
        content: "{{ acme_certificates_account.regr_json }}"
        owner: root
        group: root
        mode: '0600'
      register: acme_certificates_account_regr
    - name: Deploy LE account private_key.json
      ansible.builtin.copy:
        dest: "{{ _acme_account_dir }}/private_key.json"
        content: "{{ acme_certificates_account.private_key_json }}"
        owner: root
        group: root
        mode: '0600'
      register: acme_certificates_account_privkey
      no_log: true
    - name: Deploy LE account meta.json
      ansible.builtin.copy:
        dest: "{{ _acme_account_dir }}/meta.json"
        content: "{{ acme_certificates_account.meta_json }}"
        owner: root
        group: root
        mode: '0600'
      register: acme_certificates_account_meta
    - name: Find non-canonical LE account directories
      ansible.builtin.find:
        paths: /etc/letsencrypt/accounts/acme-v02.api.letsencrypt.org/directory
        file_type: directory
        excludes: "{{ acme_certificates_account.account_hash }}"
      register: acme_certificates_account_extras
    - name: Remove non-canonical LE account directories
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ acme_certificates_account_extras.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      register: acme_certificates_account_extras_removed
    - name: Find existing renewal configs
      ansible.builtin.find:
        paths: /etc/letsencrypt/renewal
        patterns: "*.conf"
      register: acme_certificates_renewal_configs
    - name: Repoint renewal configs to canonical account hash
      ansible.builtin.lineinfile:
        path: "{{ item.path }}"
        regexp: '^account = '
        line: "account = {{ acme_certificates_account.account_hash }}"
      loop: "{{ acme_certificates_renewal_configs.files }}"
      loop_control:
        label: "{{ item.path | basename }}"
      register: acme_certificates_renewal_repointed
    - name: Force-renew all certs against canonical account
      when: >-
        acme_certificates_account_regr.changed
        or acme_certificates_account_privkey.changed
        or acme_certificates_account_meta.changed
        or acme_certificates_account_extras_removed.changed
        or (acme_certificates_renewal_repointed.results | default([]) | selectattr('changed') | list | length > 0)
      ansible.builtin.command:
        cmd: >-
          /usr/bin/certbot renew --force-renewal
          --post-hook /usr/local/bin/prepare-certs.sh
          {% if acme_certificates_inventory_url | length > 0 %}--deploy-hook /usr/local/bin/inventory-cert.sh{% endif %}
- name: Check if domain has already a certificate
  check_mode: false
  ansible.builtin.stat:
    path: /etc/letsencrypt/live/{{ item.domain }}
  loop: "{{ acme_certificates_cert_domains }}"
  register: acme_certificates_cert_status
  loop_control:
    label: "{{ item.domain }}"
- name: Get certificate validity period for existing certs
  when: item.stat.exists
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      start=$(openssl x509 -startdate -noout -in /etc/letsencrypt/live/{{ item.item.domain }}/cert.pem | cut -d= -f2)
      end=$(openssl x509 -enddate -noout -in /etc/letsencrypt/live/{{ item.item.domain }}/cert.pem | cut -d= -f2)
      echo $(( ($(date -d "$end" +%s) - $(date -d "$start" +%s)) / 86400 ))
    executable: /bin/bash
  loop: "{{ acme_certificates_cert_status.results }}"
  loop_control:
    label: "{{ item.item.domain }}"
  register: acme_certificates_cert_validity
  changed_when: false
- name: Request certificates for new domains from Let's Encrypt
  throttle: 1
  when: >-
    not item.0.stat.exists or
    (item.0.stat.exists and acme_certificates_profile == 'shortlived' and (item.1.stdout | default('0') | int) > 30) or
    (item.0.stat.exists and acme_certificates_profile == 'default' and (item.1.stdout | default('90') | int) <= 30)
  loop: "{{ acme_certificates_cert_status.results | zip(acme_certificates_cert_validity.results | default([])) | list }}"
  loop_control:
    label: "{{ item.0.item.domain }}"
  ansible.builtin.command:
    cmd: >-
      certbot certonly -n -m '{{ acme_certificates_cert_email }}' --agree-tos --manual
      --manual-auth-hook '/usr/local/bin/acme-dns-certbot-hook -config /etc/acme-dns.cfg'
      --preferred-challenges dns
      {% if item.0.stat.exists %}--force-renewal{% endif %}
      {% if acme_certificates_profile == 'shortlived' %}--preferred-profile shortlived{% endif %}
      {% if acme_certificates_inventory_url | length > 0 %}--deploy-hook /usr/local/bin/inventory-cert.sh{% endif %}
      -d {{ item.0.item.domain }} -d '*.{{ item.0.item.domain }}'
- name: Prepare haproxy certs
  ansible.builtin.command:
    cmd: /usr/local/bin/prepare-certs.sh
- name: Add certificate auto-renew to cron
  ansible.builtin.cron:
    name: renew certificates
    minute: "{{ ansible_play_hosts.index(inventory_hostname) * 10 }}"
    hour: "*/{{ acme_certificates_renewal_hours }}"
    job: "/usr/bin/certbot renew --post-hook '/usr/local/bin/prepare-certs.sh'{% if acme_certificates_inventory_url | length > 0 %} --deploy-hook '/usr/local/bin/inventory-cert.sh'{% endif %}"
